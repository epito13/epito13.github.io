name: Compilar APK de ALSOL

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'zulu'

    - name: Instalar dependencias de Capacitor
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android
        mkdir -p www
        cp index.html www/ 2>/dev/null || true
        cp -r css www/ 2>/dev/null || true
        cp -r js www/ 2>/dev/null || true

    - name: Inicializar y sincronizar Capacitor
      run: |
        npx cap init ALSOL com.alsol.app --web-dir=www
        npx cap add android
        npx cap sync android

    - name: Compilar APK con Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Subir archivo APK listo
      uses: actions/upload-artifact@v4
      with:
        name: ALSOL-App-Android
        path: android/app/build/outputs/apk/debug/app-debug.apk
