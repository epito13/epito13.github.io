name: Compilar APK de ALSOL

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Instalar dependencias de Capacitor
      run: |
        npm init -y
        npm install @capacitor/core@5 @capacitor/cli@5 @capacitor/android@5
        mkdir -p www
        cp index.html www/ 2>/dev/null || true
        cp -r css www/ 2>/dev/null || true
        cp -r js www/ 2>/dev/null || true

    - name: Inicializar y sincronizar Capacitor
      run: |
        npx cap init ALSOL com.alsol.app --web-dir=www
        npx cap add android
        npx cap sync android

    - name: Compilar APK con Gradle
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace
